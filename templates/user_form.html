{% extends "base.html" %}
{% block title %}Tambah User{% endblock %}
{% block page_title %}Tambah User{% endblock %}
{% block content %}
<div style="max-width:460px">
  <div class="page-header">
    <div>
      <div class="page-heading">Tambah User Baru</div>
      <div class="page-sub">Buat akun untuk admin atau kasir</div>
    </div>
    <a href="{{ url_for('users') }}" class="btn btn-secondary">← Kembali</a>
  </div>
  <div class="card">
    <div class="card-body">
      <form method="POST">
        <div class="form-group">
          <label class="form-label">Username *</label>
          <input type="text" name="username" class="form-control" required placeholder="min. 3 karakter"/>
        </div>
        <div class="form-group">
          <label class="form-label">Password *</label>
          <input type="password" name="password" class="form-control" required placeholder="min. 6 karakter"/>
        </div>
        <div class="form-group">
          <label class="form-label">Role *</label>
          <select name="role" class="form-control form-select" required>
            <option value="kasir">🧾 Kasir</option>
            <option value="admin">🔑 Admin</option>
          </select>
        </div>
        <div class="btn-group" style="margin-top:8px">
          <button type="submit" class="btn btn-primary">➕ Buat Akun</button>
          <a href="{{ url_for('users') }}" class="btn btn-secondary">Batal</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
